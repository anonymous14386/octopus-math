<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Octopus Math — Sign In</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #0d1117;
      color: #c9d1d9;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
    .card {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 12px;
      padding: 2.5rem 2rem;
      width: 100%;
      max-width: 380px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.4);
    }
    .logo {
      text-align: center;
      margin-bottom: 1.5rem;
    }
    .logo svg {
      width: 48px;
      height: 48px;
      fill: #58a6ff;
    }
    h1 {
      font-size: 1.4rem;
      font-weight: 600;
      color: #f0f6fc;
      text-align: center;
      margin-bottom: 0.4rem;
    }
    .subtitle {
      text-align: center;
      font-size: 0.85rem;
      color: #8b949e;
      margin-bottom: 1.8rem;
    }
    label {
      display: block;
      font-size: 0.85rem;
      color: #8b949e;
      margin-bottom: 0.3rem;
    }
    input {
      width: 100%;
      background: #0d1117;
      border: 1px solid #30363d;
      border-radius: 6px;
      padding: 0.55rem 0.75rem;
      color: #c9d1d9;
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.2s;
      margin-bottom: 1rem;
    }
    input:focus { border-color: #58a6ff; }
    button {
      width: 100%;
      background: #238636;
      color: #fff;
      border: none;
      border-radius: 6px;
      padding: 0.6rem;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }
    button:hover { background: #2ea043; }
    button:disabled { background: #3d3d3d; cursor: not-allowed; }
    .error {
      background: #3d1c1c;
      border: 1px solid #f85149;
      border-radius: 6px;
      color: #f85149;
      font-size: 0.85rem;
      padding: 0.6rem 0.75rem;
      margin-bottom: 1rem;
      display: none;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 17.93V18c0-.55-.45-1-1-1s-1 .45-1 1v1.93C7.06 19.48 4.52 16.94 4.07 13H6c.55 0 1-.45 1-1s-.45-1-1-1H4.07C4.52 7.06 7.06 4.52 11 4.07V6c0 .55.45 1 1 1s1-.45 1-1V4.07C16.94 4.52 19.48 7.06 19.93 11H18c-.55 0-1 .45-1 1s.45 1 1 1h1.93c-.45 3.94-2.99 6.48-6.93 6.93zM12 8c-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4-1.79-4-4-4zm0 6c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2z"/>
      </svg>
    </div>
    <h1>Octopus Math</h1>
    <p class="subtitle">Sign in with your OctopusTechnology account</p>
    <div class="error" id="error-msg"></div>
    <form id="login-form">
      <label for="username">Username</label>
      <input type="text" id="username" name="username" autocomplete="username" required />
      <label for="password">Password</label>
      <input type="password" id="password" name="password" autocomplete="current-password" required />
      <button type="submit" id="submit-btn">Sign in</button>
    </form>
  </div>
  <script>
    const form = document.getElementById('login-form');
    const errorMsg = document.getElementById('error-msg');
    const submitBtn = document.getElementById('submit-btn');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      errorMsg.style.display = 'none';
      submitBtn.disabled = true;
      submitBtn.textContent = 'Signing in…';

      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;

      try {
        const res = await fetch('/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password }),
        });
        const data = await res.json();
        if (data.ok) {
          const next = new URLSearchParams(window.location.search).get('next') || '/';
          window.location.href = next;
        } else {
          errorMsg.textContent = data.error || 'Invalid credentials.';
          errorMsg.style.display = 'block';
        }
      } catch {
        errorMsg.textContent = 'Network error. Please try again.';
        errorMsg.style.display = 'block';
      } finally {
        submitBtn.disabled = false;
        submitBtn.textContent = 'Sign in';
      }
    });
  </script>
</body>
</html>
